name: PR checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    name: Python syntax and lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python check dependencies
        run: python -m pip install --upgrade numpy pandas scikit-learn ruff

      - name: Run Python checks
        run: python tools/check_python.py

  mql5:
    name: MQL5 static checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run MQL5 static checks
        run: python tools/check_mql5_static.py
